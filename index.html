<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kitchen Los Aromos</title>

<style>

:root{
--primary:#e63946;
--surface:#ffffff;
--background:#f4f4f4;
--text:#222;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:var(--background);
}

header{
background:var(--surface);
padding:0;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo-container{
width:250px;
margin:auto;
}

.logo{
width:100%;
}

/* CARRUSEL */

.carousel{
position:relative;
max-width:500px;
margin:auto;
overflow:hidden;
}

.carousel img{
width:100%;
display:none;
}

.carousel img.active{
display:block;
}

.carousel button{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.5);
color:white;
border:none;
font-size:20px;
padding:10px;
cursor:pointer;
}

.prev{ left:0; }
.next{ right:0; }

.container{
padding:15px;
max-width:500px;
margin:auto;
}

.category{
margin-top:25px;
}

.category h2{
border-bottom:2px solid var(--primary);
}

.product{
background:white;
padding:10px;
margin-top:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.product-info{
max-width:65%;
}

.product-name{
font-weight:bold;
}

.product-description{
font-size:14px;
color:#666;
}

.product-price{
color:var(--primary);
font-weight:bold;
}

.controls{
display:flex;
align-items:center;
gap:5px;
}

button{
background:var(--primary);
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}

.total-box{
background:white;
padding:15px;
margin-top:20px;
border-radius:10px;
}

input, select{
width:100%;
padding:10px;
margin-top:10px;
}

.total{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

.whatsapp-btn{
width:100%;
margin-top:15px;
padding:15px;
font-size:18px;
background:#25D366;
}

/* CONTACTOS */

.contact{
background:white;
padding:15px;
margin-top:20px;
border-radius:10px;
text-align:center;
}

.contact a{
display:block;
margin:5px;
color:#e63946;
text-decoration:none;
font-weight:bold;
}

/* MAPA */

.map{
margin-top:20px;
}

.map iframe{
width:100%;
height:250px;
border:0;
border-radius:10px;
}

</style>

</head>
<body>

<header>

<div class="logo-container">
<img src="images/logo.png" class="logo">
</div>

</header>

<!-- CARRUSEL -->

<div class="carousel">

<button class="prev" onclick="move(-1)">❮</button>

<img src="images/promo1.jpg" class="active">
<img src="images/promo2.jpg">
<img src="images/promo3.jpg">

<button class="next" onclick="move(1)">❯</button>

</div>

<div class="container">

<div id="menu"></div>

<div class="total-box">

<input type="text" id="cliente" placeholder="Nombre del cliente">

<input type="text" id="direccion" placeholder="Dirección">

<select id="deliveryType" onchange="updateTotal()">
<option value="retiro">Retiro en local (Gratis)</option>
<option value="delivery">Delivery (+$2000)</option>
</select>

<div class="total">
Total: $<span id="total">0</span>
</div>

<button class="whatsapp-btn" onclick="sendWhatsApp()">
Enviar pedido por WhatsApp
</button>

</div>

<!-- CONTACTOS -->

<div class="contact">

<h3>Contacto</h3>

<a href="https://wa.me/56931447955">💬 WhatsApp</a>

<a href="https://www.instagram.com/kitchen.los.aromos/">📸 Instagram</a>

<a href="https://www.facebook.com/kitchensushilosaromos/">📸 Facebook</a>
  
</div>

<!-- MAPA -->

<div class="map">

<iframe
src="https://www.google.com/maps?q=-29.9509505,-71.349806&z=17&output=embed">
</iframe>

</div>

</div>

<script>

const phone = "569XXXXXXXX";
const deliveryCost = 2000;

const products = [

{ id:'sushi1', name:'10 cortes Carne Mechada', description:'10 cortes con carne mechada', price:4800, category:'Sushi', icon:'🍣'},
{ id:'hand1', name:'Hand Roll Pollo Queso', description:'Pollo cebollín queso', price:3000, category:'Handrolls', icon:'🍣'},
{ id:'emp1', name:'Empanada Mechada', description:'Carne mechada queso', price:2300, category:'Empanadas', icon:'🥟'},
{ id:'papas1', name:'Papas con Tocino', description:'Papas con salsa', price:5000, category:'Papas', icon:'🍟'},
{ id:'beb1', name:'Bebida 1.5L', description:'Variedad sabores', price:2500, category:'Bebidas', icon:'🥤'},
{ id:'promo1', name:'Promo 20 cortes', description:'20 cortes kanikama', price:10000, category:'Promos', icon:'🍣'}

];

let cart = JSON.parse(localStorage.getItem("cart")) || {};

function saveCart(){
localStorage.setItem("cart", JSON.stringify(cart));
}

function renderMenu(){

const menu = document.getElementById("menu");
menu.innerHTML="";

const categories = [...new Set(products.map(p => p.category))];

categories.forEach(category => {

let html = `<div class="category"><h2>${category}</h2>`;

products
.filter(p => p.category === category)
.forEach(product => {

const qty = cart[product.id] || 0;

html += `

<div class="product">

<div class="product-info">

<div class="product-name">
${product.icon} ${product.name}
</div>

<div class="product-description">
${product.description}
</div>

<div class="product-price">
$${product.price}
</div>

</div>

<div class="controls">

<button onclick="remove('${product.id}')">−</button>

<span>${qty}</span>

<button onclick="add('${product.id}')">+</button>

</div>

</div>

`;

});

html += `</div>`;

menu.innerHTML += html;

});

updateTotal();

}

function add(id){
cart[id]=(cart[id]||0)+1;
saveCart();
renderMenu();
}

function remove(id){
cart[id]--;
if(cart[id]<=0) delete cart[id];
saveCart();
renderMenu();
}

function updateTotal(){

let total=0;

for(const id in cart){

const product = products.find(p=>p.id===id);

total+=product.price*cart[id];

}

if(document.getElementById("deliveryType").value==="delivery")
total+=deliveryCost;

document.getElementById("total").innerText=total;

}

function sendWhatsApp(){

const cliente=document.getElementById("cliente").value;
const direccion=document.getElementById("direccion").value;
const delivery=document.getElementById("deliveryType").value;

let msg="🍣 *Pedido* 🍣%0A";
msg+="Cliente: "+cliente+"%0A";

if(delivery==="delivery")
msg+="Dirección: "+direccion+"%0A";

msg+="%0A";

let total=0;

for(const id in cart){

const p=products.find(x=>x.id===id);

msg+=cart[id]+"x "+p.name+"%0A";

total+=p.price*cart[id];

}

if(delivery==="delivery"){
msg+="Delivery: $2000%0A";
total+=deliveryCost;
}

msg+="TOTAL: $"+total;

window.open("https://wa.me/"+phone+"?text="+msg);

}

/* CARRUSEL */

let index=0;
const slides=document.querySelectorAll(".carousel img");

function showSlide(i){

slides.forEach(s=>s.classList.remove("active"));

index=(i+slides.length)%slides.length;

slides[index].classList.add("active");

}

function move(step){
showSlide(index+step);
}

setInterval(()=>move(1),2000);

renderMenu();

</script>

</body>
</html>
