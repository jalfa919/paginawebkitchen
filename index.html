<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Los Aromos Kitchen y Sushi</title>

<style>

:root{
--bg:#000;
--surface:#111;
--accent:#e10600;
--text:#fff;
--muted:#aaa;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
padding-bottom:140px;
}

/* HEADER */

header{
background:#000;
text-align:center;
padding:20px 10px;
}

.logo{
width:95%;
max-width:650px;
height:auto;
display:block;
margin:0 auto;
}

/* CARRUSEL */

.carousel{
position:relative;
max-width:700px;
margin:10px auto;
overflow:hidden;
}

.carousel img{
width:100%;
border-radius:10px;
}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.5);
border:none;
color:white;
font-size:25px;
cursor:pointer;
padding:10px;
}

.left{left:0;}
.right{right:0;}

/* MENU */

.container{
max-width:700px;
margin:auto;
padding:15px;
}

.product{
background:var(--surface);
padding:15px;
margin:10px 0;
border-radius:10px;
}

.qty-control{
display:flex;
gap:10px;
align-items:center;
}

.qty-control button{
width:40px;
height:40px;
font-size:20px;
}

/* CART */

.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:#000;
padding:15px;
border-top:2px solid var(--accent);
}

button{
background:var(--accent);
border:none;
color:white;
padding:10px;
border-radius:6px;
cursor:pointer;
}

.secondary{
background:#333;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}

/* MAP */

.map{
margin-top:15px;
}

iframe{
width:100%;
border:0;
border-radius:10px;
}

</style>
</head>

<body>

<header>

<img src="images/logoaromos.png" class="logo">

</header>

<!-- CARRUSEL -->

<div class="carousel">

<button class="arrow left" onclick="prevImage()">❮</button>

<img id="carouselImage" src="images/premium1.jpg">

<button class="arrow right" onclick="nextImage()">❯</button>

</div>

<div class="container">

<h2>Menú</h2>

<div id="menu"></div>

<h2>Carrito</h2>

<div id="cart"></div>

<label>

<select id="deliveryType" onchange="updateCart()">

<option value="retiro">Retiro en local</option>
<option value="delivery">Delivery (+$2000)</option>

</select>

</label>

<h3>Datos cliente</h3>

<input id="name" placeholder="Nombre">

<input id="address" placeholder="Dirección">

<select id="payment">
<option>Efectivo</option>
<option>Transferencia</option>
</select>

<button onclick="sendOrder()">Enviar pedido WhatsApp</button>

<div class="map">

<h3>Ubicación</h3>

<iframe
src="https://www.google.com/maps?q=-29.9509505,-71.349806&z=17&output=embed"
height="250">
</iframe>

<div class="contacto">

<h3>Contacto</h3>

<!-- WhatsApp -->
<p>
<a href="https://wa.me/56979553144" target="_blank" class="social-btn whatsapp">
WhatsApp
</a>
</p>

<!-- Instagram -->
<p>
<a href="https://www.instagram.com/kitchen.los.aromos/" target="_blank" class="social-btn instagram">
Instagram
</a>
</p>

<!-- Facebook -->
<p>
<a href="https://www.facebook.com/kitchensushilosaromos/" target="_blank" class="social-btn facebook">
Facebook
</a>
</p>

</div>
<div class="cart">

Total: $<span id="total">0</span>

</div>

<script>

/* PRODUCTOS */

const products=[

{name:"Promo Sushi",price:6000},
{name:"Handroll",price:3000},
{name:"Empanada",price:2300},
{name:"Papas fritas",price:5000}

];

/* CARRITO */

let cart=JSON.parse(localStorage.getItem("cart"))||{};

/* CARRUSEL */

const images=[
"images/premium1.jpg",
"images/premium2.jpg",
"images/premium3.jpg"
];

let current=0;

function showImage(){

document.getElementById("carouselImage").src=images[current];

}

function nextImage(){

current=(current+1)%images.length;
showImage();

}

function prevImage(){

current=(current-1+images.length)%images.length;
showImage();

}

setInterval(nextImage,2000);

/* MENU */

function renderMenu(){

const menu=document.getElementById("menu");

products.forEach(p=>{

const div=document.createElement("div");

div.className="product";

div.innerHTML=`

${p.name}<br>$${p.price}

<div class="qty-control">

<button onclick="changeQty('${p.name}',-1)">-</button>

<span>${cart[p.name]||0}</span>

<button onclick="changeQty('${p.name}',1)">+</button>

</div>

`;

menu.appendChild(div);

});

}

/* CAMBIAR CANTIDAD */

function changeQty(name,delta){

cart[name]=(cart[name]||0)+delta;

if(cart[name]<=0)delete cart[name];

saveCart();
renderCart();
location.reload();

}

/* GUARDAR */

function saveCart(){

localStorage.setItem("cart",JSON.stringify(cart));

}

/* CART */

function renderCart(){

const div=document.getElementById("cart");

div.innerHTML="";

let total=0;

for(let name in cart){

let qty=cart[name];

let product=products.find(p=>p.name==name);

let subtotal=product.price*qty;

total+=subtotal;

div.innerHTML+=`

${name} x${qty} = $${subtotal}

<button onclick="remove('${name}')">Eliminar</button>

<br>

`;

}

/* DELIVERY */

if(document.getElementById("deliveryType").value=="delivery"){

total+=2000;

}

document.getElementById("total").innerText=total;

}

/* REMOVE */

function remove(name){

delete cart[name];

saveCart();
location.reload();

}

/* WHATSAPP */

function sendOrder(){

let msg="Pedido:%0A";

for(let name in cart){

msg+=`${name} x${cart[name]}%0A`;

}

msg+="Total: $"+document.getElementById("total").innerText;

window.open("https://wa.me/56979553144?text="+msg);

}

renderMenu();
renderCart();

</script>

</body>
</html>
