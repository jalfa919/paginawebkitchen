<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizzería Al Taglio</title>

<style>

/* ===== RESET ===== */
body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background:#1f2f3f;
  color:white;
}

/* ===== HEADER ===== */
header{
  background:#f2eadf;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:24px;
  font-weight:bold;
  color:black;
}

.menu-btn{
  font-size:28px;
  cursor:pointer;
  color:black;
}

/* ===== MENÚ DESPLEGABLE ===== */
.dropdown{
  position:fixed;
  top:0;
  right:-100%;
  width:250px;
  height:100%;
  background:white;
  color:black;
  transition:0.4s ease;
  padding:20px;
  box-shadow:-5px 0 20px rgba(0,0,0,0.3);
  z-index:100;
}

.dropdown.active{
  right:0;
}

.dropdown h2{
  text-decoration: underline;
  margin-top:0;
}

.dropdown ul{
  list-style:none;
  padding:0;
}

.dropdown li{
  margin:15px 0;
  font-weight:bold;
  cursor:pointer;
}

.close-btn{
  text-align:right;
  font-size:20px;
  cursor:pointer;
}

/* ===== CARRUSEL PREMIUM ===== */

.carousel-section{
  padding:30px 0;
}

.carousel-container{
  position:relative;
  overflow:hidden;
  width:100%;
}

.carousel-track{
  display:flex;
  transition: transform 0.6s cubic-bezier(0.77, 0, 0.175, 1);
}

.carousel-item{
  min-width:80%;
  margin:0 10%;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.carousel-item img{
  width:100%;
  border-radius:20px;
  display:block;
}

.carousel-item.active{
  transform:scale(1.05);
}

.carousel-item.active img{
  box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* Flechas */
.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.4);
  border:none;
  color:white;
  font-size:25px;
  padding:10px 15px;
  border-radius:50%;
  cursor:pointer;
  z-index:10;
}

.arrow.left{ left:10px; }
.arrow.right{ right:10px; }

.arrow:hover{
  background:rgba(0,0,0,0.7);
}

/* Indicadores */
.carousel-dots{
  text-align:center;
  margin-top:15px;
}

.carousel-dots span{
  height:10px;
  width:10px;
  margin:0 5px;
  background-color:#bbb;
  border-radius:50%;
  display:inline-block;
  cursor:pointer;
  transition:0.3s;
}

.carousel-dots span.active{
  background-color:#e63946;
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">PIZZERIA AL TAGLIO</div>
  <div class="menu-btn" onclick="openMenu()">☰</div>
</header>

<!-- MENÚ DESPLEGABLE -->
<div class="dropdown" id="dropdownMenu">
  <div class="close-btn" onclick="closeMenu()">✖</div>
  <h2>Menú</h2>
  <ul>
    <li>Pizzas</li>
    <li>Promociones</li>
    <li>Bebidas</li>
    <li>Complementos</li>
  </ul>
</div>

<!-- CARRUSEL -->
<section class="carousel-section">
  <div class="carousel-container">

    <button class="arrow left" onclick="prevSlide()">❮</button>

    <div class="carousel-track" id="carouselTrack">
      <div class="carousel-item">
        <img src="https://images.unsplash.com/photo-1601924928376-4b8f1bfb28b1" alt="Pizza 1">
      </div>
      <div class="carousel-item">
        <img src="https://images.unsplash.com/photo-1548365328-9f547fb0953b" alt="Pizza 2">
      </div>
      <div class="carousel-item">
        <img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65" alt="Pizza 3">
      </div>
    </div>

    <button class="arrow right" onclick="nextSlide()">❯</button>

  </div>

  <div class="carousel-dots" id="carouselDots"></div>
</section>

<script>

/* ===== MENÚ ===== */
function openMenu(){
  document.getElementById("dropdownMenu").classList.add("active");
}

function closeMenu(){
  document.getElementById("dropdownMenu").classList.remove("active");
}

/* ===== CARRUSEL ===== */
let currentIndex = 0;
const track = document.getElementById("carouselTrack");
const slides = document.querySelectorAll(".carousel-item");
const dotsContainer = document.getElementById("carouselDots");

let startX = 0;
let endX = 0;

function updateCarousel(){
  const slideWidth = slides[0].offsetWidth;
  track.style.transform = `translateX(-${currentIndex * slideWidth}px)`;

  slides.forEach(slide => slide.classList.remove("active"));
  slides[currentIndex].classList.add("active");

  document.querySelectorAll(".carousel-dots span")
    .forEach(dot => dot.classList.remove("active"));

  dotsContainer.children[currentIndex].classList.add("active");
}

function createDots(){
  slides.forEach((_, index) => {
    const dot = document.createElement("span");
    dot.addEventListener("click", () => {
      currentIndex = index;
      updateCarousel();
    });
    dotsContainer.appendChild(dot);
  });
}

function nextSlide(){
  currentIndex = (currentIndex + 1) % slides.length;
  updateCarousel();
}

function prevSlide(){
  currentIndex = (currentIndex - 1 + slides.length) % slides.length;
  updateCarousel();
}

/* Swipe táctil */
track.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

track.addEventListener("touchend", e => {
  endX = e.changedTouches[0].clientX;
  handleSwipe();
});

function handleSwipe(){
  if(startX - endX > 50){
    nextSlide();
  }
  if(endX - startX > 50){
    prevSlide();
  }
}

createDots();
updateCarousel();

</script>

</body>
</html>
