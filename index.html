<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Los Aromos Kitchen y Sushi</title>

<style>
:root{
--bg:#000;
--surface:#111;
--accent:#e10600;
--text:#fff;
--muted:#bcbcbc;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:var(--bg);
color:var(--text);
padding-bottom:110px;
}

/* HEADER */
header{
background:var(--surface);
padding:20px 10px;
text-align:center;
position:sticky;
top:0;
z-index:10;
border-bottom:2px solid var(--accent);
}

/* LOGO */
.logo{
width:100%;
max-width:320px;
height:auto;
display:block;
margin:0 auto;
}

/* CONTENIDO */
.container{
padding:15px;
max-width:640px;
margin:0 auto;
}

h3{
margin-bottom:8px;
}

.product{
background:var(--surface);
border-radius:10px;
padding:15px;
margin-bottom:15px;
border:1px solid #222;
}

.product p{
margin-top:0;
color:var(--muted);
}

/* BOTONES */
button{
background:var(--accent);
color:var(--text);
border:none;
padding:12px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
width:100%;
font-size:16px;
}

button:hover{
opacity:0.9;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

.secondary{
background:#2b2b2b;
margin-top:10px;
}

/* CARRITO FIJO */
.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:var(--surface);
padding:15px;
border-top:2px solid var(--accent);
font-size:18px;
}

/* INPUTS */
input, select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:5px;
border:none;
font-size:16px;
}

/* ADMIN */
.admin{
display:none;
background:var(--surface);
padding:15px;
margin-top:20px;
border-radius:10px;
}

/* DELIVERY */
.delivery{
margin:10px 0;
}

/* ITEMS */
.cart-items{
background:var(--surface);
border:1px solid #222;
border-radius:10px;
padding:10px;
margin-bottom:16px;
}

.cart-items ul{
padding-left:18px;
margin:8px 0;
}

.empty{
color:var(--muted);
font-style:italic;
}

small{
color:var(--muted);
}
</style>

</head>
<body>

<!-- HEADER CON LOGO -->
<header>
<img class="logo" src="images/logoaromos.png" alt="Los Aromos Kitchen y Sushi">
</header>

<div class="container">

<h3>🍣 Sushi</h3>

<div class="product">
<p>Promo 30 piezas - $12.000</p>
<button onclick="addToCart('Promo 30 piezas',12000)">Agregar</button>
</div>

<h3>🍟 Papas Fritas</h3>

<div class="product">
<p>Papas grandes - $4.000</p>
<button onclick="addToCart('Papas grandes',4000)">Agregar</button>
</div>

<h3>🥪 Sandwich</h3>

<div class="product">
<p>Sandwich Churrasco - $6.000</p>
<button onclick="addToCart('Sandwich Churrasco',6000)">Agregar</button>
</div>

<!-- DETALLE -->
<div class="cart-items">

<strong>Detalle del pedido</strong>

<ul id="cartItems"></ul>

<div id="emptyCart" class="empty">
Aún no agregas productos.
</div>

<small>
Subtotal: $<span id="subtotal">0</span>
</small>

</div>

<!-- DELIVERY -->
<div class="delivery">
<label>
<input type="checkbox" id="deliveryCheck">
Envío a domicilio (+$2000)
</label>
</div>

<h3>Datos del Cliente</h3>

<input type="text" id="name" placeholder="Nombre">

<input type="text" id="address" placeholder="Dirección">

<select id="payment">
<option value="Efectivo">Efectivo</option>
<option value="Transferencia">Transferencia</option>
</select>

<button id="sendOrderBtn" onclick="sendOrder()">
Finalizar Pedido por WhatsApp
</button>

<button class="secondary" onclick="clearCart()">
Vaciar carrito
</button>

<button class="secondary" onclick="showAdmin()">
Panel Administrador
</button>

<div class="admin" id="adminPanel">

<h3>Administrador</h3>

<input type="password" id="adminPass" placeholder="Contraseña">

<button onclick="loginAdmin()">
Entrar
</button>

<div id="adminContent" style="display:none;">

<p>
Ventas totales: $<span id="totalSales">0</span>
</p>

<button onclick="resetSales()">
Reiniciar Ventas
</button>

</div>
</div>

</div>

<!-- TOTAL -->
<div class="cart">
Carrito: $<span id="total">0</span>
</div>

<script>

const DELIVERY_PRICE = 2000;

const cart = [];

let totalSales = parseInt(localStorage.getItem("sales") || "0");

const totalElement = document.getElementById("total");

const subtotalElement = document.getElementById("subtotal");

const cartItemsElement = document.getElementById("cartItems");

const emptyCartElement = document.getElementById("emptyCart");

const totalSalesElement = document.getElementById("totalSales");

const deliveryCheckElement = document.getElementById("deliveryCheck");

totalSalesElement.innerText = totalSales;

deliveryCheckElement.addEventListener("change", updateOrderState);

function calculateSubtotal(){

return cart.reduce((acc,item)=>acc+item.price,0);

}

function calculateTotal(){

return calculateSubtotal() + (deliveryCheckElement.checked ? DELIVERY_PRICE : 0);

}

function updateOrderState(){

let subtotal = calculateSubtotal();

let total = calculateTotal();

subtotalElement.innerText = subtotal;

totalElement.innerText = total;

renderCart();

}

function renderCart(){

cartItemsElement.innerHTML="";

if(cart.length===0){

emptyCartElement.style.display="block";

return;

}

emptyCartElement.style.display="none";

cart.forEach((item,index)=>{

let li=document.createElement("li");

li.innerText=item.name+" - $"+item.price;

let btn=document.createElement("button");

btn.innerText="Quitar";

btn.className="secondary";

btn.onclick=()=>removeItem(index);

li.appendChild(btn);

cartItemsElement.appendChild(li);

});

}

function addToCart(name,price){

cart.push({name,price});

updateOrderState();

}

function removeItem(index){

cart.splice(index,1);

updateOrderState();

}

function clearCart(){

cart.length=0;

updateOrderState();

}

function sendOrder(){

let name=document.getElementById("name").value;

let address=document.getElementById("address").value;

let payment=document.getElementById("payment").value;

let delivery=deliveryCheckElement.checked;

let total=calculateTotal();

if(cart.length===0){

alert("Agrega productos");

return;

}

let message="Pedido Los Aromos Kitchen y Sushi\n";

cart.forEach(item=>{

message+=item.name+" - $"+item.price+"\n";

});

if(delivery){

message+="Delivery: $2000\n";

}

message+="Total: $"+total+"\n";

message+="Nombre: "+name+"\n";

message+="Dirección: "+address+"\n";

message+="Pago: "+payment;

totalSales+=total;

localStorage.setItem("sales",totalSales);

totalSalesElement.innerText=totalSales;

window.open("https://wa.me/56979553144?text="+encodeURIComponent(message));

clearCart();

}

function showAdmin(){

let panel=document.getElementById("adminPanel");

panel.style.display=panel.style.display==="block"?"none":"block";

}

function loginAdmin(){

let pass=document.getElementById("adminPass").value;

if(pass==="1234"){

document.getElementById("adminContent").style.display="block";

alert("Bienvenido");
}else{
alert("Contraseña incorrecta");
}
}

function resetSales(){

totalSales=0;
localStorage.setItem("sales",0);
totalSalesElement.innerText=0;
}

</script>

</body>
</html>
