<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Los Aromos Kitchen y Sushi</title>

<style>

:root{
--primary:#e63946;
--background:#000;
--surface:#111;
--card:#1b1b1b;
--text:#ffffff;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:#000;
color:#fff;
scroll-behavior:smooth;
}

/* HEADER */

header{
background:#111;
padding:5px 0;
box-shadow:0 2px 5px rgba(0,0,0,0.5);
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

.logo-container{width:200px;}
.logo{width:100%;}

.menu-btn{
position:absolute;
right:15px;
font-size:26px;
background:none;
border:none;
cursor:pointer;
color:white;
}

/* MENU */

.dropdown{
position:absolute;
top:60px;
right:10px;
background:#1b1b1b;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.6);
display:none;
padding:15px;
z-index:999;
min-width:160px;
}

.dropdown h3{
margin:0 0 10px 0;
text-decoration:underline;
}

.dropdown div{
padding:8px 5px;
cursor:pointer;
font-weight:bold;
color:white;
}

.dropdown div:hover{
background:#333;
border-radius:6px;
}

/* CARRUSEL */

.carousel-section{
max-width:500px;
margin:15px auto;
}

.carousel-container{
position:relative;
overflow:hidden;
border-radius:20px;
}

.carousel-track{
display:flex;
transition: transform 0.6s ease;
}

.carousel-item{
min-width:80%;
margin:0 10%;
}

.carousel-item img{
width:100%;
border-radius:20px;
display:block;
}

/* DOTS */

.carousel-dots{
text-align:center;
margin-top:12px;
}

.carousel-dots span{
height:10px;
width:10px;
margin:0 5px;
background:#555;
border-radius:50%;
display:inline-block;
cursor:pointer;
}

.carousel-dots span.active{
background:var(--primary);
}

/* CONTENIDO */

.container{
padding:15px;
max-width:500px;
margin:auto;
}

.category h2{
border-bottom:2px solid var(--primary);
}

/* PRODUCTOS */

.product{
background:#1b1b1b;
padding:10px;
margin-top:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.product-info{max-width:60%;}
.product-name{font-weight:bold;}
.product-description{font-size:14px;color:#aaa;}
.product-price{color:var(--primary);font-weight:bold;}

.controls{
display:flex;
align-items:center;
gap:5px;
}

button{
background:var(--primary);
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}

/* CARRITO */

.cart-box, .total-box{
background:#1b1b1b;
padding:15px;
margin-top:20px;
border-radius:10px;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-top:8px;
font-size:14px;
align-items:center;
}

.delete-btn{
background:#666;
padding:3px 8px;
margin-left:10px;
}

.subtotal{
font-weight:bold;
text-align:right;
margin-top:10px;
}

/* INPUTS */

input, select{
width:100%;
padding:10px;
margin-top:10px;
box-sizing:border-box;
background:#111;
color:white;
border:1px solid #444;
border-radius:6px;
}

.total{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

.whatsapp-btn{
width:100%;
margin-top:15px;
padding:15px;
font-size:18px;
background:#25D366;
}

/* CONTACTO */

.contact-title{
font-size:20px;
font-weight:bold;
margin-top:20px;
}

.contact{
background:#1b1b1b;
padding:15px;
margin-top:10px;
border-radius:10px;
}

.contact a{
text-decoration:none;
color:white;
font-weight:bold;
}

/* MAPA */

.map{
margin-top:20px;
border-radius:10px;
overflow:hidden;
}

/* FOOTER */

.footer{
text-align:center;
padding:20px;
font-size:14px;
color:#aaa;
margin-top:30px;
}

/* BOTON VOLVER ARRIBA */

.top-btn{
position:fixed;
bottom:20px;
right:20px;
background:var(--primary);
color:white;
font-size:20px;
border:none;
border-radius:50%;
width:45px;
height:45px;
cursor:pointer;
box-shadow:0 3px 8px rgba(0,0,0,0.5);
display:none;
}

</style>
</head>

<body>

<header>

<div class="logo-container">
<img src="images/logo.png" class="logo">
</div>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="dropdown" id="dropdownMenu">
<h3>Categorías</h3>
</div>

</header>

<section class="carousel-section">

<div class="carousel-container">

<div class="carousel-track" id="carouselTrack">

<div class="carousel-item"><img src="images/premium1.jpg"></div>
<div class="carousel-item"><img src="images/premium2.jpg"></div>
<div class="carousel-item"><img src="images/premium3.jpg"></div>

</div>

</div>

<div class="carousel-dots" id="carouselDots"></div>

</section>

<div class="container">

<div id="menu"></div>

<div class="cart-box">
<h3>🛒 Tu pedido</h3>

<div id="cart-items"></div>

<div class="subtotal">
Subtotal: $<span id="subtotal">0</span>
</div>

<button onclick="clearCart()" style="background:#666;margin-top:10px;">🗑 Vaciar carrito</button>

</div>

<div class="total-box">

<input type="text" id="cliente" placeholder="Nombre del cliente">
<input type="text" id="direccion" placeholder="Dirección">

<select id="deliveryType" onchange="updateTotal()">
<option value="retiro">Retiro en local (Gratis)</option>
<option value="delivery">Delivery (+$2000)</option>
</select>

<select id="paymentType">
<option value="Efectivo">Efectivo</option>
<option value="Transferencia">Transferencia</option>
</select>

<div class="total">Total: $<span id="total">0</span></div>

<button class="whatsapp-btn" onclick="sendWhatsApp()">
Enviar pedido por WhatsApp
</button>

</div>

<div class="contact-title">Síguenos:</div>

<div class="contact">
<a href="https://wa.me/56979553144">WhatsApp</a><br>
<a href="https://www.instagram.com/kitchen.los.aromos/" target="_blank">Instagram</a><br>
<a href="https://www.facebook.com/kitchensushilosaromos/" target="_blank">Facebook</a>
</div>

<div class="map">
<h3>Nuestra Ubicación:</h3>

<iframe 
width="100%" 
height="250" 
style="border:0"
src="https://www.google.com/maps?q=Los%20Aromos%20Kitchen%20y%20Sushi&output=embed"
allowfullscreen>
</iframe>

</div>

<div class="footer">
© 2026 Los Aromos Kitchen y Sushi — Todos los derechos reservados.
</div>

</div>

<button class="top-btn" id="topBtn" onclick="goTop()">↑</button>

<script>

const topBtn=document.getElementById("topBtn");

window.onscroll=function(){
if(document.body.scrollTop>300 || document.documentElement.scrollTop>300){
topBtn.style.display="block";
}else{
topBtn.style.display="none";
}
}

function goTop(){
window.scrollTo({
top:0,
behavior:"smooth"
});
}

</script>

</body>
</html>
