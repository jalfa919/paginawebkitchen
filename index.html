<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Los Aromos Kitchen y Sushi</title>

<style>
:root{
--bg:#000;
--surface:#111;
--accent:#e10600;
--text:#fff;
--muted:#bcbcbc;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
padding-bottom:120px;
}

header{
background:var(--surface);
padding:20px;
text-align:center;
border-bottom:2px solid var(--accent);
}

.logo{
width:100%;
max-width:300px;
}

.container{
padding:15px;
max-width:700px;
margin:auto;
}

.category{
margin-top:25px;
}

.category h2{
border-bottom:1px solid #333;
padding-bottom:5px;
color:var(--accent);
}

.product{
background:var(--surface);
padding:15px;
margin-top:10px;
border-radius:10px;
border:1px solid #222;
}

.product-title{
font-size:18px;
font-weight:bold;
}

.product-desc{
color:var(--muted);
font-size:14px;
margin:5px 0;
}

.product-price{
margin-bottom:10px;
}

button{
background:var(--accent);
color:white;
border:none;
padding:10px;
border-radius:6px;
width:100%;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:var(--surface);
padding:15px;
border-top:2px solid var(--accent);
}

.cart-items{
background:var(--surface);
padding:10px;
margin-top:15px;
border-radius:10px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:5px;
border:none;
}

</style>
</head>

<body>

<header>
<img src="images/logoaromos.png" class="logo">
</header>

<div class="container">

<div id="menu"></div>

<div class="cart-items">

<h3>Detalle pedido</h3>

<ul id="cartItems"></ul>

Subtotal: $<span id="subtotal">0</span>

</div>

<h3>Cliente</h3>

<input id="name" placeholder="Nombre">
<input id="address" placeholder="Dirección">

<select id="payment">
<option>Efectivo</option>
<option>Transferencia</option>
</select>

<button onclick="sendOrder()">Enviar por WhatsApp</button>

</div>

<div class="cart">
Total: $<span id="total">0</span>
</div>

<script>

const DELIVERY = 2000;

const products = [

{ id:'sushi1', name:'10 cortes Relleno Carne Mechada', description:'10 cortes con carne mechada', price:4800, category:'Sushi', icon:'🍣'},
{ id:'sushi2', name:'Gohan Pollo Crispy', description:'Gohan de pollo crispy', price:5000, category:'Sushi', icon:'🍚'},
{ id:'sushi3', name:'Sushi Burger Filete Crispy', description:'Sushi burger de filete crispy', price:6000, category:'Sushi', icon:'🍔'},
{ id:'hand1', name:'Hand Rolls Pollo Cebollín Queso', description:'Hand roll pollo cebollín queso', price:3000, category:'Handrolls', icon:'🍣'},

{ id:'emp1', name:'Empanada Carne Mechada Queso', description:'Carne mechada con queso', price:2300, category:'Empanadas', icon:'🥟'},

{ id:'papas1', name:'Papas con Tocino', description:'Papas con tocino y salsa', price:5000, category:'Papas', icon:'🍟'},

{ id:'sand1', name:'Sandwich Pollo Crispy', description:'Pollo crispy tomate lechuga', price:3600, category:'Sandwich', icon:'🥪'},

{ id:'beb1', name:'Bebida 1.5L', description:'Variedad sabores', price:2500, category:'Bebidas', icon:'🥤'},

{ id:'promo1', name:'Promo 20 cortes Kanikama', description:'20 cortes kanikama queso', price:10000, category:'Promos', icon:'🍣'}

];

const cart = [];

function renderMenu(){

const menu = document.getElementById("menu");

const categories = [...new Set(products.map(p=>p.category))];

categories.forEach(category=>{

const section = document.createElement("div");

section.className="category";

section.innerHTML=`<h2>${category}</h2>`;

products
.filter(p=>p.category===category)
.forEach(product=>{

const div=document.createElement("div");

div.className="product";

div.innerHTML=`

<div class="product-title">${product.icon} ${product.name}</div>

<div class="product-desc">${product.description}</div>

<div class="product-price">$${product.price}</div>

<button onclick="addToCart('${product.name}',${product.price})">
Agregar
</button>

`;

section.appendChild(div);

});

menu.appendChild(section);

});

}

function addToCart(name,price){

cart.push({name,price});

updateCart();

}

function updateCart(){

const list=document.getElementById("cartItems");

list.innerHTML="";

let total=0;

cart.forEach(item=>{

const li=document.createElement("li");

li.innerText=`${item.name} - $${item.price}`;

list.appendChild(li);

total+=item.price;

});

document.getElementById("subtotal").innerText=total;
document.getElementById("total").innerText=total;

}

function sendOrder(){

if(cart.length===0){
alert("Agrega productos");
return;
}

let msg="Pedido Los Aromos Kitchen y Sushi\n";

cart.forEach(i=>{
msg+=`${i.name} $${i.price}\n`;
});

msg+=`Total: $${document.getElementById("total").innerText}\n`;

msg+=`Nombre: ${document.getElementById("name").value}\n`;

msg+=`Dirección: ${document.getElementById("address").value}\n`;

msg+=`Pago: ${document.getElementById("payment").value}`;

window.open(`https://wa.me/56979553144?text=${encodeURIComponent(msg)}`);

}

renderMenu();

</script>

</body>
</html>
