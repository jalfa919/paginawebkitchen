<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pedido Sushi</title>

<style>

:root{
--primary:#e63946;
--surface:#ffffff;
--background:#f4f4f4;
--text:#222;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:var(--background);
}

header{
background:var(--surface);
padding:5px 0;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo-container{
width:200px;
margin:auto;
}

.logo{
width:100%;
}

.container{
padding:15px;
max-width:500px;
margin:auto;
}

.category{
margin-top:25px;
}

.category h2{
border-bottom:2px solid var(--primary);
}

.product{
background:white;
padding:10px;
margin-top:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.product-info{
max-width:65%;
}

.product-name{
font-weight:bold;
}

.product-description{
font-size:14px;
color:#666;
}

.product-price{
color:var(--primary);
font-weight:bold;
}

.controls{
display:flex;
align-items:center;
gap:5px;
}

button{
background:var(--primary);
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}

.total-box{
background:white;
padding:15px;
margin-top:20px;
border-radius:10px;
}

input, select{
width:100%;
padding:10px;
margin-top:10px;
box-sizing:border-box;
}

.total{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

.whatsapp-btn{
width:100%;
margin-top:15px;
padding:15px;
font-size:18px;
background:#25D366;
}

</style>

</head>
<body>

<header>

<div class="logo-container">
<img src="images/logo.png" class="logo">
</div>

</header>

<div class="container">

<div id="menu"></div>

<div class="total-box">

<input type="text" id="cliente" placeholder="Nombre del cliente">

<input type="text" id="direccion" placeholder="Dirección">

<select id="deliveryType" onchange="updateTotal()">
<option value="retiro">Retiro en local (Gratis)</option>
<option value="delivery">Delivery (+$2000)</option>
</select>

<div class="total">
Total: $<span id="total">0</span>
</div>

<button class="whatsapp-btn" onclick="sendWhatsApp()">
Enviar pedido por WhatsApp
</button>

</div>

</div>

<script>

const phone = "569XXXXXXXX"; // CAMBIA ESTO POR TU NUMERO
const deliveryCost = 2000;

const products = [

{ id:'sushi1', name:'10 cortes Carne Mechada', description:'10 cortes con carne mechada', price:4800, category:'Sushi', icon:'🍣'},
{ id:'sushi2', name:'Gohan Pollo Crispy', description:'Gohan de pollo crispy', price:5000, category:'Sushi', icon:'🍚'},
{ id:'sushi3', name:'Sushi Burger Filete Crispy', description:'Sushi burger crispy', price:6000, category:'Sushi', icon:'🍔'},

{ id:'hand1', name:'Hand Roll Pollo Queso', description:'Pollo cebollín queso', price:3000, category:'Handrolls', icon:'🍣'},

{ id:'emp1', name:'Empanada Mechada Queso', description:'Carne mechada queso', price:2300, category:'Empanadas', icon:'🥟'},

{ id:'papas1', name:'Papas con Tocino', description:'Papas con salsa', price:5000, category:'Papas', icon:'🍟'},

{ id:'sand1', name:'Sandwich Pollo Crispy', description:'Pollo tomate lechuga', price:3600, category:'Sandwich', icon:'🥪'},

{ id:'beb1', name:'Bebida 1.5L', description:'Variedad sabores', price:2500, category:'Bebidas', icon:'🥤'},

{ id:'promo1', name:'Promo 20 cortes', description:'20 cortes kanikama', price:10000, category:'Promos', icon:'🍣'}

];

let cart = {};

function renderMenu(){

const menu = document.getElementById("menu");

const categories = [...new Set(products.map(p => p.category))];

categories.forEach(category => {

let html = `<div class="category"><h2>${category}</h2>`;

products
.filter(p => p.category === category)
.forEach(product => {

const qty = cart[product.id] || 0;

html += `

<div class="product">

<div class="product-info">

<div class="product-name">
${product.icon} ${product.name}
</div>

<div class="product-description">
${product.description}
</div>

<div class="product-price">
$${product.price}
</div>

</div>

<div class="controls">

<button onclick="remove('${product.id}')">−</button>

<span>${qty}</span>

<button onclick="add('${product.id}')">+</button>

</div>

</div>

`;

});

html += `</div>`;

menu.innerHTML += html;

});

}

function add(id){
cart[id] = (cart[id] || 0) + 1;
refresh();
}

function remove(id){
if(cart[id]){
cart[id]--;
if(cart[id]<=0) delete cart[id];
}
refresh();
}

function updateTotal(){

let total = 0;

for(const id in cart){

const product = products.find(p => p.id === id);

total += product.price * cart[id];

}

if(document.getElementById("deliveryType").value==="delivery")
total += deliveryCost;

document.getElementById("total").innerText = total;

}

function refresh(){

document.getElementById("menu").innerHTML="";

renderMenu();

updateTotal();

}

function sendWhatsApp(){

const cliente = document.getElementById("cliente").value;
const direccion = document.getElementById("direccion").value;
const delivery = document.getElementById("deliveryType").value;

if(!cliente){

alert("Ingrese nombre del cliente");
return;

}

let message = "🍣 *NUEVO PEDIDO* 🍣%0A%0A";

message += "*Cliente:* " + cliente + "%0A";

if(delivery==="delivery")
message += "*Dirección:* " + direccion + "%0A";

message += "%0A*Detalle:*%0A";

let total = 0;

for(const id in cart){

const product = products.find(p => p.id === id);

message += cart[id] + "x " + product.name + " - $" + (product.price * cart[id]) + "%0A";

total += product.price * cart[id];

}

if(delivery==="delivery"){

message += "%0ADelivery: $2000";

total += deliveryCost;

}

message += "%0A%0A*TOTAL: $" + total + "*";

const url = "https://wa.me/" + phone + "?text=" + message;

window.open(url, "_blank");

}

renderMenu();

</script>

</body>
</html>
