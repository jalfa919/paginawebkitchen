<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Los Aromos Kitchen y Sushi</title>

<style>
:root{
--primary:#e63946;
--surface:#ffffff;
--background:#f4f4f4;
--text:#222;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:var(--background);
scroll-behavior:smooth;
}

/* HEADER */
header{
background:var(--surface);
padding:5px 0;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

.logo-container{width:200px;}
.logo{width:100%;}

.menu-btn{
position:absolute;
right:15px;
font-size:26px;
background:none;
border:none;
cursor:pointer;
}

.dropdown{
position:absolute;
top:60px;
right:10px;
background:white;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
display:none;
padding:15px;
z-index:999;
min-width:160px;
}

.dropdown h3{
margin:0 0 10px 0;
text-decoration:underline;
}

.dropdown div{
padding:8px 5px;
cursor:pointer;
font-weight:bold;
}

.dropdown div:hover{
background:#f0f0f0;
border-radius:6px;
}

/* CARRUSEL */

.carousel-section{
max-width:500px;
margin:15px auto;
}

.carousel-container{
position:relative;
overflow:hidden;
border-radius:20px;
}

.carousel-track{
display:flex;
transition: transform 0.6s ease;
}

.carousel-item{
min-width:80%;
margin:0 10%;
}

.carousel-item img{
width:100%;
border-radius:20px;
display:block;
}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.4);
border:none;
color:white;
font-size:22px;
padding:8px 12px;
border-radius:50%;
cursor:pointer;
z-index:10;
}

.arrow.left{left:10px;}
.arrow.right{right:10px;}

.carousel-dots{
text-align:center;
margin-top:12px;
}

.carousel-dots span{
height:10px;
width:10px;
margin:0 5px;
background:#ccc;
border-radius:50%;
display:inline-block;
cursor:pointer;
}

.carousel-dots span.active{
background:var(--primary);
}

/* CONTENIDO */

.container{
padding:15px;
max-width:500px;
margin:auto;
}

.category h2{
border-bottom:2px solid var(--primary);
}

.product{
background:white;
padding:10px;
margin-top:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.product-info{max-width:60%;}
.product-name{font-weight:bold;}
.product-description{font-size:14px;color:#666;}
.product-price{color:var(--primary);font-weight:bold;}

.controls{
display:flex;
align-items:center;
gap:5px;
}

button{
background:var(--primary);
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}

.cart-box, .total-box, .contact{
background:white;
padding:15px;
margin-top:20px;
border-radius:10px;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-top:8px;
font-size:14px;
}

input, select{
width:100%;
padding:10px;
margin-top:10px;
box-sizing:border-box;
}

.total{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

.whatsapp-btn{
width:100%;
margin-top:15px;
padding:15px;
font-size:18px;
background:#25D366;
}

.map{
margin-top:20px;
border-radius:10px;
overflow:hidden;
}

.footer{
text-align:center;
padding:20px;
font-size:14px;
color:#555;
margin-top:30px;
}
</style>
</head>

<body>

<header>
<div class="logo-container">
<img src="images/logo.png" class="logo">
</div>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="dropdown" id="dropdownMenu">
<h3>Menú</h3>
</div>
</header>

<!-- CARRUSEL -->
<section class="carousel-section">
<div class="carousel-container">
<button class="arrow left" onclick="prevSlide()">❮</button>
<div class="carousel-track" id="carouselTrack">
<div class="carousel-item"><img src="images/premium1.jpg"></div>
<div class="carousel-item"><img src="images/premium2.jpg"></div>
<div class="carousel-item"><img src="images/premium3.jpg"></div>
</div>
<button class="arrow right" onclick="nextSlide()">❯</button>
</div>
<div class="carousel-dots" id="carouselDots"></div>
</section>

<div class="container">
<div id="menu"></div>

<div class="cart-box">
<h3>🛒 Tu pedido</h3>
<div id="cart-items"></div>
<div class="subtotal">
Subtotal: $<span id="subtotal">0</span>
</div>
<button onclick="clearCart()" style="background:#999;margin-top:10px;">🗑 Vaciar carrito</button>
</div>

<div class="total-box">
<input type="text" id="cliente" placeholder="Nombre del cliente">
<input type="text" id="direccion" placeholder="Dirección">

<select id="deliveryType" onchange="updateTotal()">
<option value="retiro">Retiro en local (Gratis)</option>
<option value="delivery">Delivery (+$2000)</option>
</select>

<select id="paymentType">
<option value="Efectivo">Efectivo</option>
<option value="Transferencia">Transferencia</option>
</select>

<div class="total">Total: $<span id="total">0</span></div>
<button class="whatsapp-btn" onclick="sendWhatsApp()">Enviar pedido por WhatsApp</button>
</div>

<div class="map">
<h3>Nuestra Ubicación</h3>
<iframe 
width="100%" 
height="250" 
style="border:0"
src="https://www.google.com/maps?q=Los%20Aromos%20Kitchen%20y%20Sushi&output=embed"
allowfullscreen>
</iframe>
</div>

<div class="footer">
© 2026 Los Aromos Kitchen y Sushi — Todos los derechos reservados.
</div>

</div>

<script>

/* ===== CARRUSEL ===== */
let currentIndex=0;
const track=document.getElementById("carouselTrack");
const slides=document.querySelectorAll(".carousel-item");
const dotsContainer=document.getElementById("carouselDots");

function updateCarousel(){
const slideWidth=slides[0].offsetWidth;
track.style.transform=`translateX(-${currentIndex*slideWidth}px)`;
document.querySelectorAll(".carousel-dots span").forEach(d=>d.classList.remove("active"));
dotsContainer.children[currentIndex].classList.add("active");
}

function createDots(){
slides.forEach((_,i)=>{
const dot=document.createElement("span");
dot.onclick=()=>{currentIndex=i;updateCarousel();}
dotsContainer.appendChild(dot);
});
}

function nextSlide(){currentIndex=(currentIndex+1)%slides.length;updateCarousel();}
function prevSlide(){currentIndex=(currentIndex-1+slides.length)%slides.length;updateCarousel();}

window.addEventListener("load",()=>{
createDots();
updateCarousel();
setInterval(nextSlide,4000);
});

/* ===== PRODUCTOS COMPLETOS ===== */

const phone="56979553144";
const deliveryCost=2000;

const products=[
{ id:'sushi1', name:'10 cortes Carne Mechada', description:'10 cortes con carne mechada', price:4800, category:'Sushi', icon:'🍣'},
{ id:'sushi2', name:'Gohan Pollo Crispy', description:'Pollo crispy', price:5000, category:'Sushi', icon:'🍚'},
{ id:'hand1', name:'Hand Roll Pollo Queso', description:'Pollo cebollín queso', price:3000, category:'Handrolls', icon:'🍣'},
{ id:'emp1', name:'Empanada Mechada', description:'Carne mechada queso', price:2300, category:'Empanadas', icon:'🥟'},
{ id:'papas1', name:'Papas con Tocino', description:'Papas con salsa', price:5000, category:'Papas', icon:'🍟'},
{ id:'beb1', name:'Bebida 1.5L', description:'Variedad sabores', price:2500, category:'Bebidas', icon:'🥤'}
];

let cart=JSON.parse(localStorage.getItem("cart"))||{};

function renderMenu(){
const menu=document.getElementById("menu");
const dropdown=document.getElementById("dropdownMenu");

menu.innerHTML="";
dropdown.innerHTML="<h3>Menú</h3>";

const categories=[...new Set(products.map(p=>p.category))];

categories.forEach(category=>{
dropdown.innerHTML+=`<div onclick="scrollToCategory('${category}')">${category}</div>`;

let html=`<div class="category" id="${category}">
<h2>${category}</h2>`;

products.filter(p=>p.category===category).forEach(product=>{
html+=`
<div class="product">
<div class="product-info">
<div class="product-name">${product.icon} ${product.name}</div>
<div class="product-description">${product.description}</div>
<div class="product-price">$${product.price}</div>
</div>
<div class="controls">
<button onclick="removeItem('${product.id}')">-</button>
<span>${cart[product.id]||0}</span>
<button onclick="add('${product.id}')">+</button>
</div>
</div>`;
});

html+="</div>";
menu.innerHTML+=html;
});

updateCart();
}

function add(id){
cart[id]=(cart[id]||0)+1;
saveCart();
renderMenu();
}

function removeItem(id){
if(cart[id]){
cart[id]--;
if(cart[id]<=0)delete cart[id];
saveCart();
renderMenu();
}
}

function clearCart(){
cart={};
saveCart();
renderMenu();
}

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
updateCart();
}

function updateCart(){
const cartItems=document.getElementById("cart-items");
cartItems.innerHTML="";
let subtotal=0;

for(let id in cart){
const product=products.find(p=>p.id===id);
const qty=cart[id];
const total=product.price*qty;
subtotal+=total;

cartItems.innerHTML+=`
<div class="cart-item">
${product.name} x${qty}
<span>$${total}</span>
</div>`;
}

document.getElementById("subtotal").innerText=subtotal;
updateTotal();
}

function updateTotal(){
let subtotal=parseInt(document.getElementById("subtotal").innerText)||0;
let delivery=document.getElementById("deliveryType").value==="delivery"?deliveryCost:0;
document.getElementById("total").innerText=subtotal+delivery;
}

function sendWhatsApp(){

if(Object.keys(cart).length===0){
alert("Agrega productos al carrito");
return;
}

let cliente=document.getElementById("cliente").value.trim();
if(cliente===""){
alert("Ingresa el nombre del cliente");
return;
}

let direccion=document.getElementById("direccion").value;
let deliveryType=document.getElementById("deliveryType").value;
let paymentType=document.getElementById("paymentType").value;
let total=document.getElementById("total").innerText;

let message="🍣 NUEVO PEDIDO 🍣\n\n";
message+=`Nombre: ${cliente}\n`;
message+=`Dirección: ${direccion}\n`;
message+=`Tipo de pedido: ${deliveryType}\n\n`;
message+="Detalle:\n";

for(let id in cart){
let product=products.find(p=>p.id===id);
let qty=cart[id];
let lineTotal=product.price*qty;
message+=`${qty} x ${product.name} = $${lineTotal}\n`;
}

if(deliveryType==="delivery"){
message+=`Delivery = $${deliveryCost}\n`;
}

message+=`Total = $${total}\n`;
message+=`Tipo de pago: ${paymentType}`;

window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`);
}

function toggleMenu(){
const menu=document.getElementById("dropdownMenu");
menu.style.display=menu.style.display==="block"?"none":"block";
}

function scrollToCategory(cat){
document.getElementById(cat).scrollIntoView({behavior:"smooth"});
toggleMenu();
}

renderMenu();

</script>

</body>
</html>
