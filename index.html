<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Los Aromos Kitchen y Sushi</title>

<style>

:root{
--primary:#e63946;
--surface:#ffffff;
--background:#f4f4f4;
--text:#222;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:var(--background);
scroll-behavior:smooth;
}

/* HEADER */

header{
background:var(--surface);
padding:5px 0;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

.logo-container{
width:200px;
}

.logo{
width:100%;
}

/* BOTON MENU */

.menu-btn{
position:absolute;
right:15px;
font-size:26px;
background:none;
color:black;
cursor:pointer;
}

.dropdown{
position:absolute;
top:60px;
right:10px;
background:white;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
display:none;
padding:15px;
z-index:999;
min-width:160px;
}

.dropdown h3{
margin:0 0 10px 0;
text-decoration:underline;
}

.dropdown div{
padding:8px 5px;
cursor:pointer;
font-weight:bold;
}

.dropdown div:hover{
background:#f0f0f0;
border-radius:6px;
}

/* ===== CARRUSEL PREMIUM ===== */

.carousel-section{
max-width:500px;
margin:15px auto;
}

.carousel-container{
position:relative;
overflow:hidden;
border-radius:20px;
}

.carousel-track{
display:flex;
transition: transform 0.6s cubic-bezier(0.77, 0, 0.175, 1);
}

.carousel-item{
min-width:80%;
margin:0 10%;
transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.carousel-item img{
width:100%;
border-radius:20px;
display:block;
}

.carousel-item.active{
transform:scale(1.05);
}

.carousel-item.active img{
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.4);
border:none;
color:white;
font-size:22px;
padding:8px 12px;
border-radius:50%;
cursor:pointer;
z-index:10;
}

.arrow.left{left:10px;}
.arrow.right{right:10px;}

.arrow:hover{
background:rgba(0,0,0,0.7);
}

.carousel-dots{
text-align:center;
margin-top:12px;
}

.carousel-dots span{
height:10px;
width:10px;
margin:0 5px;
background:#ccc;
border-radius:50%;
display:inline-block;
cursor:pointer;
transition:0.3s;
}

.carousel-dots span.active{
background:var(--primary);
}

/* CONTENIDO */

.container{
padding:15px;
max-width:500px;
margin:auto;
}

.category{
margin-top:25px;
}

.category h2{
border-bottom:2px solid var(--primary);
}

.product{
background:white;
padding:10px;
margin-top:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.product-info{
max-width:65%;
}

.product-name{
font-weight:bold;
}

.product-description{
font-size:14px;
color:#666;
}

.product-price{
color:var(--primary);
font-weight:bold;
}

.controls{
display:flex;
align-items:center;
gap:5px;
}

button{
background:var(--primary);
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}

.cart-box{
background:white;
padding:15px;
margin-top:20px;
border-radius:10px;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:8px;
font-size:14px;
}

.subtotal{
margin-top:10px;
font-weight:bold;
}

.total-box{
background:white;
padding:15px;
margin-top:20px;
border-radius:10px;
}

input, select{
width:100%;
padding:10px;
margin-top:10px;
box-sizing:border-box;
}

.total{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

.whatsapp-btn{
width:100%;
margin-top:15px;
padding:15px;
font-size:18px;
background:#25D366;
}

.contact{
background:white;
padding:15px;
margin-top:20px;
border-radius:10px;
}

.contact a{
display:block;
margin-top:5px;
color:black;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<div class="logo-container">
<img src="images/logo.png" class="logo">
</div>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="dropdown" id="dropdownMenu">
<h3>Menú</h3>
</div>
</header>

<!-- CARRUSEL PREMIUM -->
<section class="carousel-section">
  <div class="carousel-container">

    <button class="arrow left" onclick="prevSlide()">❮</button>

    <div class="carousel-track" id="carouselTrack">
      <div class="carousel-item">
        <img src="images/premium1.jpg">
      </div>
      <div class="carousel-item">
        <img src="images/premium2.jpg">
      </div>
      <div class="carousel-item">
        <img src="images/premium3.jpg">
      </div>
    </div>

    <button class="arrow right" onclick="nextSlide()">❯</button>

  </div>

  <div class="carousel-dots" id="carouselDots"></div>
</section>

<div class="container">
<div id="menu"></div>
</div>

<script>

/* ===== CARRUSEL JS PREMIUM ===== */

let currentIndex = 0;
const track = document.getElementById("carouselTrack");
const slides = document.querySelectorAll(".carousel-item");
const dotsContainer = document.getElementById("carouselDots");

let startX = 0;
let endX = 0;

function updateCarousel() {
  const slideWidth = slides[0].offsetWidth;
  track.style.transform = `translateX(-${currentIndex * slideWidth}px)`;

  slides.forEach(slide => slide.classList.remove("active"));
  slides[currentIndex].classList.add("active");

  document.querySelectorAll(".carousel-dots span")
    .forEach(dot => dot.classList.remove("active"));

  dotsContainer.children[currentIndex].classList.add("active");
}

function createDots() {
  slides.forEach((_, index) => {
    const dot = document.createElement("span");
    dot.addEventListener("click", () => {
      currentIndex = index;
      updateCarousel();
    });
    dotsContainer.appendChild(dot);
  });
}

function nextSlide() {
  currentIndex = (currentIndex + 1) % slides.length;
  updateCarousel();
}

function prevSlide() {
  currentIndex = (currentIndex - 1 + slides.length) % slides.length;
  updateCarousel();
}

track.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

track.addEventListener("touchend", e => {
  endX = e.changedTouches[0].clientX;
  if (startX - endX > 50) nextSlide();
  if (endX - startX > 50) prevSlide();
});

setInterval(nextSlide, 4000);

createDots();
updateCarousel();

</script>

</body>
</html>
